<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/balance-icon.svg" />
    <!-- Home-screen tiles: iOS wants a PNG apple-touch-icon; Android reads the
         manifest icons. Both render the Orbital emblem on the space-navy brand
         background (SVG favicons are ignored for home-screen installs). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Balance" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070a12" />
    <title>Balance — Orbital Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Apply theme class before React renders to prevent flash -->
    <script>(function(){var t=localStorage.getItem('balance_theme')||'dark';if(t==='dark')document.documentElement.classList.add('dark')})()</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
